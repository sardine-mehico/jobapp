services:
  jobapp-api:
    build: ./api
    container_name: jobapp-api
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_KEY: "${APP_KEY}"
      APP_URL: "http://localhost:9000"
      ADMIN_URL: "http://localhost:3000"
      FRONTEND_URL: "http://localhost:3000"
      ADMIN_EMAIL: "${ADMIN_EMAIL}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      ADMIN_NAME: "${ADMIN_NAME}"
      DB_CONNECTION: pgsql
      DB_HOST: jobapp-db
      DB_PORT: 5432
      DB_DATABASE: jobapp
      DB_USERNAME: jobapp
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_CLIENT: predis
      REDIS_HOST: jobapp-redis
      REDIS_PORT: 6379
      SANCTUM_STATEFUL_DOMAINS: "admin.officepc.online,localhost:3000"
      SESSION_DOMAIN: ".officepc.online"
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
    depends_on:
      - jobapp-db
      - jobapp-redis
    ports:
      - "9000:80"

  jobapp-nuxt:
    build: ./frontend
    container_name: jobapp-nuxt
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE: "http://localhost:9000/api"
      NUXT_PUBLIC_GA4_ID: "${NUXT_PUBLIC_GA4_ID:-}"
    depends_on:
      - jobapp-api
    ports:
      - "3000:3000"

  jobapp-db:
    image: postgres:18
    container_name: jobapp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobapp
      POSTGRES_USER: jobapp
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - ./.docker-data/postgres:/var/lib/postgresql
    ports:
      - "5434:5432"

  jobapp-redis:
    image: redis:7-alpine
    container_name: jobapp-redis
    restart: unless-stopped
    volumes:
      - ./.docker-data/redis:/data
    ports:
      - "6380:6379"
